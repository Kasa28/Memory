<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Memory Spiel</title>
</head>
<body>
  <main class="memory-page">
    <section class="hero">
      <div class="hero__overlay">
        <p class="hero__text">It’s play time.</p>
        <h1 class="hero__title">Ready to play?</h1>
        <button class="hero__button">Play</button>
      </div>
    </section>

    <section class="settings">
      <div class="settings__left">
        <h2 class="settings__title">Settings</h2>

        <div class="settings__group">
          <h3>Game themes</h3>
          <label><input type="radio" name="theme" value="foods" checked> Foods theme</label>
          <label><input type="radio" name="theme" value="gaming"> Gaming theme</label>
        </div>

        <div class="settings__group">
          <h3>Choose player</h3>
          <label><input type="radio" name="player" value="blue" checked> Blue</label>
          <label><input type="radio" name="player" value="orange"> Orange</label>
        </div>

        <div class="settings__group">
          <h3>Board size</h3>
          <label><input type="radio" name="size" value="16" checked> 16 cards</label>
          <label><input type="radio" name="size" value="24"> 24 cards</label>
          <label><input type="radio" name="size" value="36"> 36 cards</label>
        </div>
      </div>

      <div class="settings__right">
        <div class="settings__preview"></div>

        <div class="settings__summary">
          <span>Game theme</span>
          <span>Blue Player</span>
          <span>Board-16 Cards</span>
          <button class="settings__start">Start</button>
        </div>
      </div>
    </section>

    <section class="game">
      <div class="game__topbar">
        <div class="game__score">6</div>
        <div class="game__current-player">Current player: Blue</div>
        <button class="game__exit">Exit game</button>
      </div>

      <section id="field" class="game__board">
        <button class="card">
          <div class="card__inner">
            <div class="card__face card__face--front"></div>
            <div class="card__face card__face--back"></div>
          </div>
        </button>
      </section>
    </section>
  </main>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
