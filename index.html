<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Memory Spiel</title>
  </head>
  <body>
    <main class="memory-page">
      <section class="hero" id="hero">
        <img src="/stadia_controller.svg" class="hero__bg-icon" alt="" />

        <div class="hero__overlay">
          <p class="hero__text">It’s play time.</p>
          <h1 class="hero__title">Ready to play?</h1>

          <button class="hero__button" id="playBtn" aria-label="Play">
            <img class="hero__button-default" src="/Primary_button.svg" alt="" />
            <img class="hero__button-hover" src="/Property 1=hover.svg" alt="" />
          </button>
        </div>
      </section>

      <section class="settings is-hidden" id="settings">
        <div class="settings__left">
          <h2 class="settings__title">Settings</h2>

          <div class="settings__group">
            <h3 class="settings__heading">
              <img src="/palette.svg" alt="" class="settings__icon" />
              <span>Game themes</span>
            </h3>

            <label class="settings__option">
              <input type="radio" name="theme" value="foods" checked />
              <span>Foods theme</span>
              <img src="/Line.svg" class="settings__indicator" alt="" />
            </label>

            <label class="settings__option">
              <input type="radio" name="theme" value="gaming" />
              <span>Gaming theme</span>
              <img src="/Line.svg" class="settings__indicator" alt="" />
            </label>
          </div>

          <div class="settings__group">
            <h3 class="settings__heading">
              <img src="/chess_pawn.svg" alt="" class="settings__icon" />
              <span>Choose player</span>
            </h3>

            <label class="settings__option">
              <input type="radio" name="player" value="blue" />
              <span>Blue</span>
              <img src="/Line.svg" class="settings__indicator" alt="" />
            </label>

            <label class="settings__option">
              <input type="radio" name="player" value="orange" />
              <span>Orange</span>
              <img src="/Line.svg" class="settings__indicator" alt="" />
            </label>
          </div>

          <div class="settings__group">
            <h3 class="settings__heading">
              <img src="/style.svg" alt="" class="settings__icon" />
              <span>Board size</span>
            </h3>

            <label class="settings__option">
              <input type="radio" name="size" value="16" />
              <span>16 cards</span>
              <img src="/Line.svg" class="settings__indicator" alt="" />
            </label>

            <label class="settings__option">
              <input type="radio" name="size" value="24" />
              <span>24 cards</span>
              <img src="/Line.svg" class="settings__indicator" alt="" />
            </label>

            <label class="settings__option">
              <input type="radio" name="size" value="36" />
              <span>36 cards</span>
              <img src="/Line.svg" class="settings__indicator" alt="" />
            </label>
          </div>
        </div>

        <div class="settings__right">
          <div class="settings__preview" id="preview"></div>

          <div class="settings__summary">
            <span id="summaryTheme">Game theme</span>
            <span id="summaryPlayer">Player</span>
            <span id="summarySize">Board size</span>
            <button class="settings__start" id="startBtn" disabled>Start</button>
          </div>
        </div>
      </section>

      <section class="game is-hidden" id="game">
        <div class="game__topbar">
          <div class="game__scores">
            <div class="game__score-box">
              <img id="orangeScoreIcon" alt="" class="game__score-icon" />
              <span id="orangeScore">0</span>
            </div>

            <div class="game__score-box">
              <img id="blueScoreIcon" alt="" class="game__score-icon" />
              <span id="blueScore">0</span>
            </div>
          </div>

          <div class="game__current-player">
            <span>Current player:</span>
            <img id="currentPlayerIcon" class="game__player-icon" alt="" />
          </div>

          <button class="game__exit" id="exitGameBtn">Exit game</button>
        </div>

        <section class="game__board" id="field"></section>

        <div class="game__modal is-hidden" id="exitModal">
          <div class="game__modal-box">
            <p class="game__modal-text">Are you sure you want to quit the game?</p>

            <div class="game__modal-actions">
              <button class="game__modal-cancel" id="cancelExitBtn">
                No, back to game
              </button>

              <button class="game__modal-confirm" id="confirmExitBtn">
                Yes, quit game
              </button>
            </div>
          </div>
        </div>

        <div class="game__result is-hidden" id="gameEndScreen">
          <div class="game__result-box game__result-box--end" id="gameEndBox">
            <h2 class="game__result-title">GAME END</h2>
            <p class="game__result-subtitle">Final score</p>

            <div class="game__result-score">
              <img id="resultBlueIcon" class="game__result-icon" alt="" />
              <span id="resultBlueScore">0</span>
              <span>-</span>
              <span id="resultOrangeScore">0</span>
              <img id="resultOrangeIcon" class="game__result-icon" alt="" />
            </div>
          </div>
        </div>

        <div class="game__result is-hidden" id="winnerScreen">
          <div class="game__result-box game__result-box--winner" id="winnerBox">
            <p class="game__winner-subtitle">The winner is</p>
            <h2 class="game__winner-title" id="winnerTitle">Blue Player</h2>

            <img id="winnerIcon" src="/trophy.svg" alt="" class="game__winner-icon" />

            <button class="game__winner-home" id="winnerHomeBtn">Home</button>
          </div>
        </div>
      </section>
    </main>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
